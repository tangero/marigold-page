<!DOCTYPE html>
<html lang="cs">
  <head>
    <title>{{ page.title }} | Marigold.cz</title>
    {% seo title=false %}
    {% include meta.html %}
    <link rel="stylesheet" type="text/css" href="/assets/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="/feed.xml" />

    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="shortcut icon" href="/images/favicon.ico">

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <meta name="theme-color" content="#16181c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Ahrefs Analytics -->
    <script src="https://analytics.ahrefs.com/analytics.js" data-key="8DK1Fml+9uQuIb76lJoKXA" async></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Přejít na obsah</a>
    <!-- Blog header (standard Marigold.cz navigation) -->
    <div id="bar"></div>
    <div class="wrapper-container">
      <div class="wrapper-masthead">
        <div class="container">
          <header class="masthead">
            <a href="/" class="site-avatar"><img src="{{ site.avatar }}" alt="{{ site.title }}" /></a>
            <div class="site-info">
              <h1 class="site-name"><a href="/">{{ site.name }}</a></h1>
              <p class="site-description">{{ site.description }}</p>
            </div>
            <nav aria-label="Hlavní navigace">
              <ul>
                <li><a href="/search" aria-label="Hledat">🔍</a></li>
                <li class="nav-separator" aria-hidden="true">|</li>
                <li><a href="https://www.prolnuto.cz/">🧑‍💻 Kurzy AI</a></li>
                <li class="nav-separator" aria-hidden="true">|</li>
                <li><a href="https://www.vibecoding.cz/">🖥️ Vibecoding</a></li>
                <li class="nav-separator" aria-hidden="true">|</li>
                <li><a href="/mobilnisite">🗼 4G/5G</a></li>
                <li class="nav-separator" aria-hidden="true">|</li>
                <li><a href="/ai">🤖 AI</a></li>
                <li class="nav-separator" aria-hidden="true">|</li>
                <li>
                  <span class="nav-dropdown">
                    <button class="nav-dropdown-toggle" aria-expanded="false" aria-label="Další menu">
                      Další ☰
                    </button>
                    <div class="nav-dropdown-menu" role="menu">
                      <a href="/tech-news/" role="menuitem">💻 Zprávy</a>
                      <a href="/obrazy" role="menuitem">🖼️ Obrazy</a>
                    </div>
                  </span>
                </li>
              </ul>
            </nav>
          </header>
        </div>
      </div>

      <!-- Full-width content area for aiprace app -->
      <div class="wrapper-main" style="max-width:100%">
        <div id="main" role="main" style="max-width:1600px;margin:0 auto;padding:0">
          <div id="aiprace-app">
            {{ content }}
          </div>
        </div>
      </div>

      <div class="wrapper-footer">
        <div class="container">
          {% include footer.html %}
        </div>
      </div>
    </div>

    {% include analytics.html %}

    <script>
    // Navigační dropdown (from default.html)
    (function() {
      var dt = document.querySelector('.nav-dropdown-toggle');
      var dm = document.querySelector('.nav-dropdown-menu');
      if (dt && dm) {
        dt.addEventListener('click', function(e) {
          e.preventDefault(); e.stopPropagation();
          var exp = dt.getAttribute('aria-expanded') === 'true';
          dt.setAttribute('aria-expanded', !exp);
          dm.classList.toggle('show');
        });
        document.addEventListener('click', function(e) {
          if (!e.target.closest('.nav-dropdown')) {
            dt.setAttribute('aria-expanded', 'false');
            dm.classList.remove('show');
          }
        });
      }
    })();
    </script>
  </body>
</html>
