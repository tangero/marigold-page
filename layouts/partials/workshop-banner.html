<div class="posts">
  <div id="vibecoding-promo" style="display:none;">
    <a id="vibecoding-promo-link" href="https://www.vibecoding.cz/akce/" class="workshop-banner-link">
      <div class="workshop-banner">
        <div class="workshop-banner-content">
          <div class="workshop-banner-header-row">
            <span class="workshop-banner-badge" id="vibecoding-promo-badge">Workshop</span>
            <span class="workshop-banner-date" id="vibecoding-promo-date"></span>
          </div>
          <div class="workshop-banner-title" id="vibecoding-promo-title"></div>
          <div class="workshop-banner-desc" id="vibecoding-promo-desc" style="display:none;"></div>
          <div class="workshop-banner-early" id="vibecoding-promo-early" style="display:none;"></div>
        </div>
        <div class="workshop-banner-cta">
          <span class="workshop-banner-btn">Detaily &rarr;</span>
        </div>
      </div>
    </a>
  </div>
  <script>
  (function(){
    var months=['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
    fetch('https://www.vibecoding.cz/api/active-promotion')
      .then(function(r){return r.json();})
      .then(function(e){
        if(!e||!e.slug)return;
        var d=e.date.split('-');
        var df=parseInt(d[2])+'. '+months[parseInt(d[1])-1]+' '+d[0];
        var city=e.city||(e.location?e.location.split(',').slice(-1)[0].trim():'');
        var dateText=df+(city?' · '+city:'')+(e.dateVariants&&e.dateVariants.length>1?' · a další termíny':'');
        var url='https://www.vibecoding.cz/akce/'+e.slug+'/?utm_source=marigold&utm_medium=web&utm_campaign=event-promo';

        document.getElementById('vibecoding-promo-link').href=url;
        document.getElementById('vibecoding-promo-badge').textContent=e.isPaid?'Workshop':'Akce';
        document.getElementById('vibecoding-promo-title').textContent=e.title;
        document.getElementById('vibecoding-promo-date').textContent=dateText;

        if(e.bannerDescription){
          var descEl=document.getElementById('vibecoding-promo-desc');
          descEl.textContent=e.bannerDescription;
          descEl.style.display='';
        }
        if(e.isPaid&&e.earlyBirdPrice&&e.earlyBirdDeadline){
          var now=new Date();
          var deadline=new Date(e.earlyBirdDeadline+'T23:59:59');
          if(now<=deadline){
            var earlyEl=document.getElementById('vibecoding-promo-early');
            var ed=e.earlyBirdDeadline.split('-');
            earlyEl.textContent='Early bird — do '+parseInt(ed[2])+'. '+months[parseInt(ed[1])-1]+'.';
            earlyEl.style.display='';
          }
        }

        document.getElementById('vibecoding-promo').style.display='';
      })
      .catch(function(){});
  })();
  </script>
</div>
