<script>
document.addEventListener('DOMContentLoaded', function() {
    // Najdi vsechny code bloky (kromě Mermaid)
    const codeBlocks = document.querySelectorAll('pre:not(:has(code.language-mermaid))');

    codeBlocks.forEach((codeBlock, index) => {
        // Vytvor kontejner pro code block
        const container = document.createElement('div');
        container.className = 'code-block-container';

        // Vytvor tlacitko kopirovani
        const copyButton = document.createElement('button');
        copyButton.className = 'copy-button';
        copyButton.textContent = 'Kopírovat';
        copyButton.setAttribute('data-index', index);

        // Vloz code block a tlacitko do kontejneru
        codeBlock.parentNode.insertBefore(container, codeBlock);
        container.appendChild(copyButton);
        container.appendChild(codeBlock);

        // Pridej event listener
        copyButton.addEventListener('click', async () => {
            try {
                const code = codeBlock.querySelector('code') || codeBlock;
                const text = code.textContent;

                await navigator.clipboard.writeText(text);

                copyButton.textContent = 'Zkopírováno!';
                copyButton.classList.add('copied');

                showToast();

                setTimeout(() => {
                    copyButton.textContent = 'Kopírovat';
                    copyButton.classList.remove('copied');
                }, 2000);

            } catch (err) {
                console.error('Chyba při kopírování:', err);
                copyButton.textContent = 'Chyba';
                copyButton.classList.add('copied');

                setTimeout(() => {
                    copyButton.textContent = 'Kopírovat';
                    copyButton.classList.remove('copied');
                }, 2000);
            }
        });
    });
});

function showToast() {
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(() => {
        toast.style.display = 'none';
    }, 2000);
}
</script>
