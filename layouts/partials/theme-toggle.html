<button id="theme-toggle" class="theme-toggle" aria-label="Prepnout svetly/tmavy rezim" title="Prepnout svetly/tmavy rezim">
  <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"></circle>
    <line x1="12" y1="1" x2="12" y2="3"></line>
    <line x1="12" y1="21" x2="12" y2="23"></line>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
    <line x1="1" y1="12" x2="3" y2="12"></line>
    <line x1="21" y1="12" x2="23" y2="12"></line>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
  </svg>
  <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
  </svg>
</button>

<script>
(function() {
  var KEY = 'marigold-theme';
  var toggle = document.getElementById('theme-toggle');
  var root = document.documentElement;

  function shouldBeDark() {
    var stored = localStorage.getItem(KEY);
    if (stored === 'dark') return true;
    if (stored === 'light') return false;
    // Auto: dark after sunset (18:00-06:00) or system preference
    var h = new Date().getHours();
    if (h >= 18 || h < 6) return true;
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function apply(dark) {
    root.setAttribute('data-theme', dark ? 'dark' : 'light');
  }

  apply(shouldBeDark());

  if (toggle) {
    toggle.addEventListener('click', function() {
      var nowDark = root.getAttribute('data-theme') === 'dark';
      apply(!nowDark);
      localStorage.setItem(KEY, !nowDark ? 'dark' : 'light');
    });
  }

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    if (!localStorage.getItem(KEY)) apply(e.matches);
  });
})();
</script>
