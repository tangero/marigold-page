name: Build and Deploy (GitHub Pages) - DISABLED
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'This workflow is disabled. Use hugo-build.yml instead.'
        required: true

jobs:
  build:
    if: false  # Disabled 2026-03-29 - replaced by hugo-build.yml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Cache Jekyll
        uses: actions/cache@v4
        with:
          path: .jekyll-cache
          key: jekyll-${{ hashFiles('Gemfile.lock') }}-${{ github.run_id }}
          restore-keys: |
            jekyll-${{ hashFiles('Gemfile.lock') }}-

      - name: Build Jekyll site
        run: JEKYLL_ENV=production bundle exec jekyll build
        env:
          LANG: en_US.UTF-8
          LANGUAGE: en_US
          LC_ALL: en_US.UTF-8

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
