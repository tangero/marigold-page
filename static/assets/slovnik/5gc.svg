<svg viewBox="0 0 1536 1024" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif" style="background:#fff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
    </marker>
  </defs>

  <!-- TITULEK -->
  <rect x="0" y="0" width="1536" height="110" fill="#F8FAFC"/>
  <text x="768" y="52" text-anchor="middle" font-size="38" font-weight="700" fill="#1E3A5F">5GC – 5G Core Network</text>
  <text x="768" y="90" text-anchor="middle" font-size="20" fill="#475569">Architektura jádra 5G sítě (Service-Based Architecture)</text>

  <!-- ===== DIAGRAM pás y=130–700 ===== -->

  <!-- SBA sběrnice (HTTP/2 + JSON) -->
  <rect x="200" y="148" width="1136" height="44" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="768" y="175" text-anchor="middle" font-size="17" font-weight="600" fill="#1D4ED8">SBA sběrnice – HTTP/2 + JSON (Service-Based Interface)</text>

  <!-- NRF -->
  <rect x="640" y="210" width="180" height="56" rx="8" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="730" y="238" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">NRF</text>
  <text x="730" y="257" text-anchor="middle" font-size="14" fill="#BFDBFE">úložiště služeb</text>

  <!-- NEF -->
  <rect x="860" y="210" width="180" height="56" rx="8" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="950" y="238" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">NEF</text>
  <text x="950" y="257" text-anchor="middle" font-size="14" fill="#BFDBFE">vystavení schopností</text>

  <!-- AMF -->
  <rect x="380" y="330" width="190" height="60" rx="8" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="475" y="358" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">AMF</text>
  <text x="475" y="378" text-anchor="middle" font-size="14" fill="#BFDBFE">správa přístupu</text>

  <!-- AUSF / UDM -->
  <rect x="620" y="330" width="200" height="60" rx="8" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="720" y="358" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">AUSF / UDM</text>
  <text x="720" y="378" text-anchor="middle" font-size="14" fill="#BFDBFE">autentizace</text>

  <!-- SMF -->
  <rect x="870" y="330" width="190" height="60" rx="8" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="965" y="358" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">SMF</text>
  <text x="965" y="378" text-anchor="middle" font-size="14" fill="#BFDBFE">správa relací</text>

  <!-- PCF -->
  <rect x="1110" y="330" width="190" height="60" rx="8" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="1205" y="358" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">PCF</text>
  <text x="1205" y="378" text-anchor="middle" font-size="14" fill="#BFDBFE">správa politik</text>

  <!-- UE -->
  <rect x="80" y="490" width="160" height="60" rx="8" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="160" y="518" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">UE</text>
  <text x="160" y="538" text-anchor="middle" font-size="14" fill="#BFDBFE">zařízení</text>

  <!-- RAN -->
  <rect x="290" y="490" width="160" height="60" rx="8" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="370" y="518" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">RAN</text>
  <text x="370" y="538" text-anchor="middle" font-size="14" fill="#BFDBFE">rádiová síť</text>

  <!-- UPF -->
  <rect x="820" y="490" width="190" height="60" rx="8" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="915" y="518" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">UPF</text>
  <text x="915" y="538" text-anchor="middle" font-size="14" fill="#BFDBFE">uživatelská rovina</text>

  <!-- DN -->
  <rect x="1090" y="490" width="190" height="60" rx="8" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="1185" y="518" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">DN</text>
  <text x="1185" y="538" text-anchor="middle" font-size="14" fill="#BFDBFE">datová síť</text>

  <!-- ===== ŠIPKY ===== -->

  <!-- UE → RAN -->
  <line x1="240" y1="520" x2="288" y2="520" stroke="#EA580C" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="264" y="512" text-anchor="middle" font-size="14" fill="#EA580C">rádiový</text>
  <text x="264" y="528" text-anchor="middle" font-size="14" fill="#EA580C">přístup</text>

  <!-- RAN → AMF (registrace a mobilita) -->
  <line x1="370" y1="490" x2="430" y2="392" stroke="#EA580C" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="370" y="448" text-anchor="middle" font-size="14" fill="#EA580C">registrace</text>
  <text x="370" y="464" text-anchor="middle" font-size="14" fill="#EA580C">a mobilita</text>

  <!-- AMF → AUSF/UDM (autentizace předplatitele) -->
  <line x1="570" y1="360" x2="618" y2="360" stroke="#EA580C" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="594" y="350" text-anchor="middle" font-size="14" fill="#EA580C">autentizace</text>
  <text x="594" y="366" text-anchor="middle" font-size="14" fill="#EA580C">předplatitele</text>

  <!-- SMF → UPF (konfigurace pravidel N4) -->
  <line x1="965" y1="390" x2="915" y2="488" stroke="#EA580C" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="975" y="445" text-anchor="middle" font-size="14" fill="#EA580C">konfigurace</text>
  <text x="975" y="461" text-anchor="middle" font-size="14" fill="#EA580C">pravidel N4</text>

  <!-- UPF → DN (směrování uživatelských dat) -->
  <line x1="1010" y1="520" x2="1088" y2="520" stroke="#EA580C" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="1049" y="510" text-anchor="middle" font-size="14" fill="#EA580C">směrování</text>
  <text x="1049" y="526" text-anchor="middle" font-size="14" fill="#EA580C">uživat. dat</text>

  <!-- AMF ↔ SBA sběrnice (vertikální spojení) -->
  <line x1="475" y1="330" x2="475" y2="192" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- SMF ↔ SBA sběrnice -->
  <line x1="965" y1="330" x2="965" y2="192" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- PCF ↔ SBA sběrnice -->
  <line x1="1205" y1="330" x2="1205" y2="192" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- NRF ↔ SBA sběrnice -->
  <line x1="730" y1="210" x2="730" y2="192" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- NEF ↔ SBA sběrnice -->
  <line x1="950" y1="210" x2="950" y2="192" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- AUSF/UDM ↔ SBA sběrnice -->
  <line x1="720" y1="330" x2="720" y2="192" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- PCF → SMF (politiky) -->
  <line x1="1110" y1="360" x2="1062" y2="360" stroke="#EA580C" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="1086" y="350" text-anchor="middle" font-size="13" fill="#EA580C">politiky</text>

  <!-- ===== PARAMETRY (zelené) pás y=600–690 ===== -->
  <rect x="80" y="600" width="1376" height="88" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  <text x="768" y="625" text-anchor="middle" font-size="17" font-weight="700" fill="#15803D">Klíčové parametry a vlastnosti</text>
  <text x="200" y="652" text-anchor="middle" font-size="15" fill="#166534">Rozhraní N4</text>
  <text x="200" y="670" text-anchor="middle" font-size="14" fill="#166534">(SMF–UPF)</text>
  <text x="450" y="652" text-anchor="middle" font-size="15" fill="#166534">Protokol HTTP/2</text>
  <text x="450" y="670" text-anchor="middle" font-size="14" fill="#166534">+ JSON (SBA)</text>
  <text x="700" y="652" text-anchor="middle" font-size="15" fill="#166534">Oddělení</text>
  <text x="700" y="670" text-anchor="middle" font-size="14" fill="#166534">CP / UP</text>
  <text x="950" y="652" text-anchor="middle" font-size="15" fill="#166534">Network</text>
  <text x="950" y="670" text-anchor="middle" font-size="14" fill="#166534">Slicing</text>
  <text x="1220" y="652" text-anchor="middle" font-size="15" fill="#166534">Edge Computing</text>
  <text x="1220" y="670" text-anchor="middle" font-size="14" fill="#166534">(distribuovaná UPF)</text>

  <!-- Oddělovací čáry parametrů -->
  <line x1="320" y1="610" x2="320" y2="680" stroke="#16A34A" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="570" y1="610" x2="570" y2="680" stroke="#16A34A" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="820" y1="610" x2="820" y2="680" stroke="#16A34A" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1080" y1="610" x2="1080" y2="680" stroke="#16A34A" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== ČÍSLOVANÝ POSTUP pás y=720–900 ===== -->
  <rect x="0" y="710" width="1536" height="4" fill="#E2E8F0"/>
  <text x="80" y="748" font-size="17" font-weight="700" fill="#1E3A5F">Postup registrace a datového toku:</text>
  <text x="80" y="778" font-size="15" fill="#334155">1. UE se připojí přes RAN k síti a zahájí registraci směrem k AMF.</text>
  <text x="80" y="802" font-size="15" fill="#334155">2. AMF kontaktuje AUSF / UDM pro autentizaci předplatitele a ověření identity.</text>
  <text x="80" y="826" font-size="15" fill="#334155">3. SMF vytvoří relaci (PDU Session) a přes rozhraní N4 nakonfiguruje pravidla v UPF.</text>
  <text x="80" y="850" font-size="15" fill="#334155">4. PCF dodá SMF politiky QoS; NRF zprostředkuje discovery služeb přes SBA sběrnici.</text>
  <text x="80" y="874" font-size="15" fill="#334155">5. UPF směruje uživatelská data mezi RAN a datovou sítí (DN) – internet / MEC.</text>

  <!-- ===== LEGENDA pás y=940–1010 ===== -->
  <rect x="0" y="930" width="1536" height="90" fill="#F8FAFC"/>
  <rect x="200" y="955" width="28" height="28" rx="4" fill="#2563EB"/>
  <text x="238" y="974" font-size="16" fill="#1E3A5F">Funkční bloky / komponenty</text>
  <line x1="560" y1="969" x2="620" y2="969" stroke="#EA580C" stroke-width="3" marker-end="url(#arr)"/>
  <text x="632" y="974" font-size="16" fill="#1E3A5F">Datové / signálové toky</text>
  <rect x="960" y="955" width="28" height="28" rx="4" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  <text x="998" y="974" font-size="16" fill="#1E3A5F">Výstupní parametry a vlastnosti</text>
  <line x1="1300" y1="969" x2="1360" y2="969" stroke="#2563EB" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="1372" y="974" font-size="16" fill="#1E3A5F">SBA propojení</text>
</svg>